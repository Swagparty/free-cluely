# MONA Live — build & publish to Google Cloud Storage (Windows only)
#
# Triggers on merge/push to master, version tags (v*), and manual dispatch.
#
# Public URL (via api.mona-ai.cloud load balancer backend bucket):
#   https://api.mona-ai.cloud/mona-live/
#
# Required GitHub secrets:
#   GCP_SA_KEY  — service account JSON key with storage.objectAdmin
#   GCP_BUCKET  — mona-live-updates
#
# Optional GitHub variable:
#   GCP_PREFIX  — object prefix (default: mona-live)

name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: bash
        run: npm version --no-git-tag-version "${{ needs.resolve-version.outputs.version }}"

      - name: Build renderer
        run: npm run build

      - name: Compile Electron
        run: npx tsc -p electron/tsconfig.json

      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          retention-days: 30
          if-no-files-found: error

  publish:
    needs: [resolve-version, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release/windows

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        env:
          GCP_BUCKET: ${{ secrets.GCP_BUCKET }}
          GCP_PREFIX: ${{ vars.GCP_PREFIX }}
        run: |
          set -euo pipefail
          PREFIX="${GCP_PREFIX:-mona-live}"
          DEST="gs://${GCP_BUCKET}/${PREFIX}/"
          echo "Uploading to ${DEST}"
          gsutil -m cp release/windows/* "$DEST"
          echo "Published version ${{ needs.resolve-version.outputs.version }} to ${DEST}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: MONA Live v${{ needs.resolve-version.outputs.version }}
          files: release/windows/*
          generate_release_notes: true
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
